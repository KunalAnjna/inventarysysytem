<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Tool & Member Inventory</title>

<style>
:root { --primary:#2563eb; --secondary:#4f46e5; --bg:#f3f4f6; --white:#ffffff; --danger:#ef4444; --success:#10b981;}
body{font-family:Segoe UI;background:var(--bg);margin:0;padding:20px}
.container{max-width:1200px;margin:auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.tabs{ display:flex;gap:10px;margin-bottom:20px}
.tab{color: black; padding:10px 20px;background:white;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.tab.active{background:var(--primary);color:white}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px}
input,select{width:100%;padding:10px;margin-top:5px;margin-bottom:10px;border:1px solid #ddd;border-radius:6px}
button{background:var(--primary);color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer}
button.danger{background:var(--danger)}
button.secondary{background:var(--secondary)}
.stats{display:flex;gap:20px;margin-bottom:20px}
.stat-box{flex:1;background:white;padding:15px;border-radius:8px;text-align:center}
.stat-number{font-size:1.5rem;font-weight:bold;color:var(--primary)}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>🛠 Inventory System</h1>
</div>

<div class="stats">
<div class="stat-box"><div class="stat-number" id="total-members">0</div>Members</div>
<div class="stat-box"><div class="stat-number" id="total-tools">0</div>Tools</div>
<div class="stat-box"><div class="stat-number" id="active-checkouts">0</div>Active Checkouts</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('members')">Members</button>
<button class="tab" onclick="switchTab('tools')">Tools</button>
<button class="tab" onclick="switchTab('checkouts')">Check-Outs</button>
</div>

<div id="members-section" class="card">

<h3>Add Member</h3>

<input id="memberName" placeholder="Member name">
<input id="memberRole" placeholder="Role">

<button onclick="addMember()">Add Member</button>

<table id="membersTable">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Role</th>
<th>Active</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>


<div id="tools-section" class="card hidden">

<h3>Add Tool</h3>

<input id="toolName" placeholder="Tool name">

<select id="toolCategory">
<option>Power Tools</option>
<option>Hand Tools</option>
<option>Safety Gear</option>
<option>Other</option>
</select>

<input id="toolSerial" placeholder="Serial number">

<button onclick="addTool()">Add Tool</button>

<table id="toolsTable">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Serial</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<div id="checkouts-section" class="card hidden">

<h3>Checkout Tool</h3>

<select id="checkoutMember"></select>
<select id="checkoutTool"></select>
<input type="date" id="checkoutDate">

<button onclick="checkoutTool()">Checkout</button>

<table id="checkoutsTable">

<thead>
<tr>
<th>Member</th>
<th>Tool</th>
<th>Serial</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot
}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBAPb33ULTdGg5OuQbpj-tAbB4J965DVoI",
authDomain: "inventory-sysytem.firebaseapp.com",
projectId: "inventory-sysytem",
storageBucket: "inventory-sysytem.firebasestorage.app",
messagingSenderId: "259162775372",
appId: "1:259162775372:web:7d185f8f33434b6c9b39e9",
measurementId: "G-KZ9BYSTKG2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let members=[]
let tools=[]
let checkouts=[]


window.switchTab=function(tab){

document.getElementById("members-section").classList.add("hidden")
document.getElementById("tools-section").classList.add("hidden")
document.getElementById("checkouts-section").classList.add("hidden")

document.getElementById(tab+"-section").classList.remove("hidden")

}


window.addMember=async function(){

const name=document.getElementById("memberName").value
const role=document.getElementById("memberRole").value

await addDoc(collection(db,"members"),{

name:name,
role:role,
activeCheckouts:0

})

}


window.addTool=async function(){

const name=document.getElementById("toolName").value
const category=document.getElementById("toolCategory").value
const serial=document.getElementById("toolSerial").value

await addDoc(collection(db,"tools"),{

name:name,
category:category,
serial:serial,
status:"available"

})

}


window.deleteMember=async function(id){

await deleteDoc(doc(db,"members",id))

}


window.deleteTool=async function(id){

await deleteDoc(doc(db,"tools",id))

}


window.checkoutTool=async function(){

const memberId=document.getElementById("checkoutMember").value
const toolId=document.getElementById("checkoutTool").value
const date=document.getElementById("checkoutDate").value

const member=members.find(m=>m.id==memberId)
const tool=tools.find(t=>t.id==toolId)

await addDoc(collection(db,"checkouts"),{

memberId,
memberName:member.name,
toolId,
toolName:tool.name,
serial:tool.serial,
date

})

await updateDoc(doc(db,"tools",toolId),{status:"checked-out"})
await updateDoc(doc(db,"members",memberId),{activeCheckouts:member.activeCheckouts+1})

}


window.returnTool=async function(id){

const checkout=checkouts.find(c=>c.id==id)

await deleteDoc(doc(db,"checkouts",id))

await updateDoc(doc(db,"tools",checkout.toolId),{status:"available"})

const member=members.find(m=>m.id==checkout.memberId)

await updateDoc(doc(db,"members",checkout.memberId),{activeCheckouts:member.activeCheckouts-1})

}


onSnapshot(collection(db,"members"),snap=>{

members=[]
snap.forEach(d=>members.push({id:d.id,...d.data()}))

renderMembers()
renderDropdowns()
updateStats()

})


onSnapshot(collection(db,"tools"),snap=>{

tools=[]
snap.forEach(d=>tools.push({id:d.id,...d.data()}))

renderTools()
renderDropdowns()
updateStats()

})


onSnapshot(collection(db,"checkouts"),snap=>{

checkouts=[]
snap.forEach(d=>checkouts.push({id:d.id,...d.data()}))

renderCheckouts()
updateStats()

})


function renderMembers(){

const tbody=document.querySelector("#membersTable tbody")
tbody.innerHTML=""

members.forEach(m=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${m.id}</td>
<td>${m.name}</td>
<td>${m.role}</td>
<td>${m.activeCheckouts}</td>
<td><button class="danger" onclick="deleteMember('${m.id}')">Delete</button></td>
`

tbody.appendChild(tr)

})

}


function renderTools(){

const tbody=document.querySelector("#toolsTable tbody")
tbody.innerHTML=""

tools.forEach(t=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${t.id}</td>
<td>${t.name}</td>
<td>${t.category}</td>
<td>${t.serial}</td>
<td>${t.status}</td>
<td><button class="danger" onclick="deleteTool('${t.id}')">Delete</button></td>
`

tbody.appendChild(tr)

})

}


function renderCheckouts(){

const tbody=document.querySelector("#checkoutsTable tbody")
tbody.innerHTML=""

checkouts.forEach(c=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${c.memberName}</td>
<td>${c.toolName}</td>
<td>${c.serial}</td>
<td>${c.date}</td>
<td><button class="secondary" onclick="returnTool('${c.id}')">Return</button></td>
`

tbody.appendChild(tr)

})

}


function renderDropdowns(){

const memberSel=document.getElementById("checkoutMember")
const toolSel=document.getElementById("checkoutTool")

memberSel.innerHTML='<option>Select Member</option>'
toolSel.innerHTML='<option>Select Tool</option>'

members.forEach(m=>memberSel.innerHTML+=`<option value="${m.id}">${m.name}</option>`)

tools.forEach(t=>{

if(t.status==="available")
toolSel.innerHTML+=`<option value="${t.id}">${t.name}</option>`

})

}


function updateStats(){

document.getElementById("total-members").innerText=members.length
document.getElementById("total-tools").innerText=tools.length
document.getElementById("active-checkouts").innerText=checkouts.length

}

</script>

</body>
</html>
